name: mytodo_fe dev

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      TARGET_REGION: ${{ vars.DEV_AWS_REGION || vars.AWS_REGION }}
      TARGET_S3_BUCKET_NAME: ${{ vars.DEV_S3_BUCKET_NAME || vars.S3_BUCKET_NAME }}
      TARGET_CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.DEV_CLOUDFRONT_DISTRIBUTION_ID || vars.CLOUDFRONT_DISTRIBUTION_ID }}
      TARGET_REACT_APP_API_URL: ${{ vars.DEV_REACT_APP_API_URL || vars.REACT_APP_API_URL }}

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Dependencies
        run: npm ci

      - name: Build React App
        run:  npm run build
        env:
            CI: false
            REACT_APP_API_URL: ${{ env.TARGET_REACT_APP_API_URL }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.DEV_mytodo_cicd_role_arn }}
          aws-region: ${{ env.TARGET_REGION }}

      - name: Upload to S3
        run: |
          aws s3 sync build/ s3://${{ env.TARGET_S3_BUCKET_NAME }} --delete

      - name: Invalidate CloudFront Cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.TARGET_CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

  